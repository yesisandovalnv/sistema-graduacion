## PROBLEMAS CRÍTICOS (5)

```yaml
problemas_criticos:

  - id: "P-001"
    titulo: "Sin logging centralizado"
    descripcion: "El proyecto usa solo print() statements. En producción, los logs se pierden."
    criticidad: "🔴 CRÍTICA"
    esfuerzo: "30 min"
    roi: "10/10"
    archivos_afectados:
      - "reportes/views.py"
      - "documentos/views.py"
      - "postulantes/services.py"
    impacto:
      seguridad: "Alta - Imposible debuggear fallos"
      performance: "Media - Diags lentos en prod"
      compliance: "Alta - Datos estudiantes sin auditoría"
    solucion:
      tipo: "Implementar logging + Sentry"
      complejidad: "Baja"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#PROBLEMA1"

  - id: "P-002"
    titulo: "API retorna HTTP 200 en errores"
    descripcion: "Las vistas retornan status=200 incluso cuando hay excepciones"
    criticidad: "🔴 CRÍTICA"
    esfuerzo: "15 min"
    roi: "10/10"
    archivos_afectados:
      - "reportes/views.py"
      - "documentos/views.py"
    lineas: "Líneas 20,31,39,63,87,90"
    impacto:
      frontend: "Frontend cree éxito cuando hay fallo"
      monitoring: "Alertas no se disparan"
      debugging: "Imposible debuggear automáticamente"
    solucion:
      tipo: "Retornar 500 en excepciones"
      complejidad: "Muy baja"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#PROBLEMA2"

  - id: "P-003"
    titulo: "Tokens JWT en localStorage (XSS VULNERABLE)"
    descripcion: "Tokens guardados en localStorage = accesible a JavaScript = vulnerable a XSS"
    criticidad: "🔴 CRÍTICA"
    esfuerzo: "60 min"
    roi: "10/10"
    archivos_afectados:
      - "frontend/src/api/axios.js (o similar)"
      - "frontend/src/context/AuthContext.jsx"
    impacto:
      seguridad: "CRÍTICA - Robo de autenticación"
      ventana_riesgo: "60 minutos (TTL del token)"
      cvss_score: "7.5"
    solucion:
      tipo: "Migrar a httpOnly cookies"
      complejidad: "Media"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#PROBLEMA3"
      pasos:
        - "Backend: retornar Set-Cookie header"
        - "Frontend: remover localStorage de tokens"
        - "Axios: configurar credentials include"

  - id: "P-004"
    titulo: "Sin rate limiting"
    descripcion: "No hay protección contra fuerza bruta en login o abuso de API"
    criticidad: "🔴 CRÍTICA"
    esfuerzo: "15 min"
    roi: "9/10"
    archivos_afectados:
      - "config/settings.py"
    impacto:
      seguridad: "CRÍTICA - Ataque de fuerza bruta sin límite"
      disponibilidad: "ALTA - Posible DoS"
      cvss_score: "7.2"
    solucion:
      tipo: "Agregar DEFAULT_THROTTLE_CLASSES en DRF"
      complejidad: "Muy baja"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#PROBLEMA4"

  - id: "P-005"
    titulo: "N+1 queries en dashboard"
    descripcion: "Dashboard hace 8+ queries separadas en lugar de 1 agregación"
    criticidad: "🔴 CRÍTICA"
    esfuerzo: "45 min"
    roi: "8/10"
    archivos_afectados:
      - "reportes/services.py"
    funcion_afectada: "dashboard_general()"
    impacto:
      performance: "Dashboard tarda 5+ segundos"
      escalabilidad: "No puede crecer a 1000+ usuarios"
      queries_actual: 8
      queries_objetivo: 1
    solucion:
      tipo: "Refactorizar con aggregate()"
      complejidad: "Media"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#PROBLEMA5"
      mejora_esperada: "5 seg → 0.3 seg (-94%)"
```

