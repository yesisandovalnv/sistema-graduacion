## PROBLEMAS MEDIANOS (4)

```yaml
problemas_medianos:

  - id: "P-012"
    titulo: "Sin caché Redis"
    criticidad: "📌 MEDIA"
    esfuerzo: "240 min"
    roi: "7/10"
    impacto:
      datos_estaticos: "Modalidades, etapas consultadas 1000x sin cambio"
    solucion:
      tipo: "Configurar caché Django + Redis"

  - id: "P-013"
    titulo: "Tokens sin rotate"
    criticidad: "📌 MEDIA"
    esfuerzo: "60 min"
    roi: "6/10"
    config:
      actual: "ROTATE_REFRESH_TOKENS = False (probable)"
      objetivo: "ROTATE_REFRESH_TOKENS = True"
    impacto:
      seguridad: "Token comprometido = acceso indefinido"

  - id: "P-014"
    titulo: "CSRF verification"
    criticidad: "📌 MEDIA"
    esfuerzo: "30 min"
    roi: "6/10"
    verificar:
      - "axios incluye X-CSRFToken header"
      - "Backend tiene CSRF middleware"

  - id: "P-015"
    titulo: "Reportes sin async"
    criticidad: "📌 MEDIA"
    esfuerzo: "180 min"
    roi: "7/10"
    problema: "Reportes pesados bloquean request"
    solucion:
      tipo: "Usar Celery tasks para reportes"
      archivos_afectados:
        - "reportes/views.py"
        - "reportes/tasks.py (crear)"
```

