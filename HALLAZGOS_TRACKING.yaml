## PROBLEMAS ALTOS (6)

```yaml
problemas_altos:

  - id: "P-006"
    titulo: "Validación débil en frontend"
    criticidad: "🟡 ALTA"
    esfuerzo: "120 min"
    roi: "7/10"
    archivos_afectados:
      - "frontend/src/pages/*.jsx"
      - "frontend/src/components/Form*.jsx"
    solucion:
      tipo: "Agregar validaciones locales antes de enviar"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#PROBLEMA6"

  - id: "P-007"
    titulo: "Sin soft deletes"
    criticidad: "🟡 ALTA"
    esfuerzo: "120 min"
    roi: "8/10"
    archivos_afectados:
      - "postulantes/models.py"
      - "documentos/models.py"
      - "modalidades/models.py"
    impacto:
      data_loss: "Una eliminación = pérdida permanente"
      auditoría: "Sin registro de eliminaciones"
      compliance: "Violación regulatoria"
    solucion:
      tipo: "Implementar deleted + deleted_at en todos los modelos"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#SOFT_DELETE"

  - id: "P-008"
    titulo: "Falta de índices en BD"
    criticidad: "🟡 ALTA"
    esfuerzo: "60 min"
    roi: "8/10"
    archivos_afectados:
      - "postulantes/models.py"
      - "documentos/models.py"
      - "modalidades/models.py"
    campos_sin_indice:
      - "nombre, apellido (búsqueda lenta)"
      - "estado (filtros lentos)"
      - "postulacion + estado (combinado)"
    solucion:
      tipo: "Agregar indexes en Meta de modelos"
      archivo_guia: "GUIA_SOLUCIONES_RAPIDAS.md#INDICES"
      mejora_esperada: "Búsquedas 10x más rápidas"

  - id: "P-009"
    titulo: "Sin validación MIME de archivos"
    criticidad: "🟡 ALTA"
    esfuerzo: "60 min"
    roi: "7/10"
    archivos_afectados:
      - "documentos/models.py"
      - "documentos/serializers.py"
    impacto:
      seguridad: "Archivo .exe renombrado a .pdf pasa validación"
    solucion:
      tipo: "Validar MIME type del contenido"

  - id: "P-010"
    titulo: "Error handling inconsistente"
    criticidad: "🟡 ALTA"
    esfuerzo: "120 min"
    roi: "7/10"
    problema:
      - "Ejemplo 1: {error: string}"
      - "Ejemplo 2: {detail: string}"
      - "Ejemplo 3: []"
    solucion:
      tipo: "Estandarizar a {detail: string} + status codes"

  - id: "P-011"
    titulo: "Paginación offset (lenta)"
    criticidad: "🟡 ALTA"
    esfuerzo: "120 min"
    roi: "5/10"
    impacto:
      performance: "Página 1000 rescanea 100k registros"
    solucion:
      tipo: "Migrar a CursorPagination"
```

